<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-mail verificado com sucesso</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eef7ff, #f7fbff);
      color: #1f2937;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
      border: 1px solid rgba(226, 232, 240, 0.9);
    }

    .icon-wrapper {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      background: #ecfdf5;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: pop 0.45s ease-out;
    }

    .check-icon {
      width: 44px;
      height: 44px;
      color: #10b981;
    }

    h1 {
      font-size: 28px;
      line-height: 1.2;
      color: #111827;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: #6b7280;
      margin-bottom: 28px;
    }

    .email-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      color: #374151;
      margin-bottom: 28px;
      word-break: break-word;
    }

    .button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      background: #2563eb;
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .button:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.22);
    }

    .secondary-link {
      display: inline-block;
      margin-top: 18px;
      color: #2563eb;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
    }

    .secondary-link:hover {
      text-decoration: underline;
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: scale(0.75);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 32px 24px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="icon-wrapper" aria-hidden="true">
      <svg class="check-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 6L9 17L4 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>

    <h1>E-mail verificado com sucesso!</h1>

    <p>
      Sua conta foi confirmada com segurança.
    </p>
  </main>
</body>
</html>
